<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gallery — Photos from the Ethiopian Peace Archive movement.">
    <title>Gallery — Ethiopian Peace Archive</title>
    <style>
        :root{--bg:#060f1e;--card:#0d1b33;--green:#22c55e;--green-bright:#4ade80;--green-dim:rgba(34,197,94,0.10);--green-border:rgba(34,197,94,0.20);--gold:#fbbf24;--text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Georgia',serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7}
        nav{background:rgba(6,15,30,0.97);border-bottom:1px solid rgba(34,197,94,0.15);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
        nav .logo{font-size:1rem;font-weight:bold;color:var(--gold);font-family:-apple-system,sans-serif}
        nav .logo span{color:var(--green-bright)}
        nav a{color:var(--text-dim);text-decoration:none;padding:7px 12px;border-radius:20px;font-size:0.8rem;font-family:-apple-system,sans-serif}
        nav a:hover{color:var(--green-bright);background:var(--green-dim)}
        .container{max-width:1100px;margin:30px auto;padding:0 16px}
        h1{color:var(--gold);margin-bottom:16px;border-left:4px solid var(--green);padding-left:12px;font-family:-apple-system,sans-serif;font-size:1.5rem}
        
        .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
        .gallery-item{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;aspect-ratio:4/3;background:var(--card);border:1px solid var(--green-border);transition:all 0.3s}
        .gallery-item:hover{transform:scale(1.03);border-color:var(--green);box-shadow:0 12px 30px rgba(0,0,0,0.5)}
        .gallery-item img{width:100%;height:100%;object-fit:cover}
        .gallery-item .caption{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.9));padding:16px;color:#fff;font-family:-apple-system,sans-serif;font-size:0.85rem}
        
        .lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:2000;align-items:center;justify-content:center;flex-direction:column}
        .lightbox.open{display:flex}
        .lightbox img{max-width:90%;max-height:75vh;border-radius:8px}
        .lightbox .lb-caption{color:#fff;margin-top:16px;font-family:-apple-system,sans-serif;font-size:1rem}
        .lightbox .close{position:absolute;top:20px;right:30px;color:#fff;font-size:2rem;cursor:pointer;background:none;border:none}
        
        footer{text-align:center;padding:24px;color:var(--text-muted);border-top:1px solid rgba(34,197,94,0.10);margin-top:30px;font-family:-apple-system,sans-serif;font-size:0.78rem}
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">🕊️ Ethiopian <span>Peace</span> Archive</a>
    <div style="display:flex;gap:2px;flex-wrap:wrap">
        <a href="index.html">Home</a><a href="voices.html">Voices</a><a href="blog.html">Blog</a>
        <a href="courses.html">Courses</a><a href="dashboard.html">Impact</a>
        <a href="gallery.html" style="color:var(--green-bright);background:var(--green-dim)">Gallery</a>
        <a href="support.html">Support</a>
    </div>
</nav>

<main class="container">
    <h1>🖼️ Gallery</h1>
    <p style="color:var(--text-dim);margin-bottom:24px">Moments from the peace movement — events, contributors, and community.</p>
    
    <div class="gallery-grid" id="galleryGrid">
        <!-- Will be populated from localStorage/API -->
    </div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="close">&times;</button>
    <img src="" alt="" id="lbImage">
    <div class="lb-caption" id="lbCaption"></div>
</div>

<footer><p>Ethiopian Peace Archive &copy; 2026</p></footer>

<script>
// Load gallery from localStorage
const items = JSON.parse(localStorage.getItem('epa_gallery') || '[]');

// Also add some default placeholder images
const defaultGallery = [
    {title:'Peace Gathering in Addis Ababa', image_url:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=600', category:'Events'},
    {title:'Community Dialogue Session', image_url:'https://images.unsplash.com/photo-1511632765486-a01980e01a18?w=600', category:'Community'},
    {title:'Voices Collection Workshop', image_url:'https://images.unsplash.com/photo-1544531586-fde5298cdd40?w=600', category:'Workshop'},
    {title:'Media Interview', image_url:'https://images.unsplash.com/photo-1590650046871-92c887180603?w=600', category:'Media'},
    {title:'Peace Conference 2024', image_url:'https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=600', category:'Events'},
    {title:'Youth Peace Forum', image_url:'https://images.unsplash.com/photo-1523580494863-6f3031224c94?w=600', category:'Youth'},
];

const allGallery = [...items, ...defaultGallery];

const grid = document.getElementById('galleryGrid');
grid.innerHTML = allGallery.map((item,i) => `
    <div class="gallery-item" onclick="openLightbox('${item.image_url}','${item.title||''}')">
        <img src="${item.image_url}" alt="${item.title||'Gallery image'}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22200%22><rect fill=%22%230d1b33%22 width=%22300%22 height=%22200%22/><text fill=%22%2394a3b8%22 x=%22150%22 y=%22100%22 text-anchor=%22middle%22 font-family=%22sans-serif%22>🖼️</text></svg>'">
        <div class="caption">${item.title||'Untitled'}</div>
    </div>
`).join('');

function openLightbox(url, caption){
    document.getElementById('lightbox').classList.add('open');
    document.getElementById('lbImage').src = url;
    document.getElementById('lbCaption').textContent = caption;
    document.body.style.overflow = 'hidden';
}

function closeLightbox(){
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
}
</script>
</body>
</html>
