<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="Sign in to your Ethiopian Peace Archive account to manage your chapters and connect with the community.">
    <meta property="og:title" content="Sign In — Ethiopian Peace Archive">
    <meta property="og:description" content="Access your dashboard, manage chapters, and connect with peace voices worldwide.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://ethiopianpeacearchive.org/signin">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊️</text></svg>">
    <title>Sign In — Ethiopian Peace Archive</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --bg: #060f1e; --card: #0d1b33; --green: #22c55e; --green-bright: #4ade80;
            --green-dim: rgba(34,197,94,0.10); --green-border: rgba(34,197,94,0.20);
            --gold: #fbbf24; --gold-bright: #fcd34d; --gold-soft: rgba(251,191,36,0.1);
            --text: #e2e8f0; --text-dim: #94a3b8; --text-muted: #64748b;
            --font-ui: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --radius: 14px; --radius-lg: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:var(--font-ui); line-height:1.6; -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; align-items:center; justify-content:center; background-image:radial-gradient(ellipse at 20% 20%, rgba(34,197,94,0.03) 0%, transparent 50%), radial-gradient(ellipse at 80% 60%, rgba(251,191,36,0.02) 0%, transparent 50%); }
        a { text-decoration:none; color:inherit; }

        .auth-container { width:100%; max-width:440px; padding:20px; }
        .auth-card { background:var(--card); border:2px solid var(--gold); border-radius:var(--radius-lg); padding:36px 32px; box-shadow:0 8px 40px rgba(0,0,0,0.5); }
        .auth-header { text-align:center; margin-bottom:28px; }
        .auth-logo { font-size:2.5rem; margin-bottom:10px; }
        .auth-header h1 { color:var(--gold-bright); font-size:1.5rem; font-weight:800; margin-bottom:4px; }
        .auth-header p { color:var(--text-dim); font-size:0.85rem; }

        .tabs { display:flex; gap:4px; margin-bottom:24px; background:rgba(255,255,255,0.03); border-radius:12px; padding:5px; }
        .tab { flex:1; padding:12px; border-radius:8px; cursor:pointer; border:none; background:transparent; color:var(--text-dim); font-size:0.9rem; font-weight:600; font-family:var(--font-ui); transition:0.2s; }
        .tab.active { background:var(--green-dim); color:var(--green-bright); }

        .form-group { margin-bottom:16px; }
        .form-group label { display:block; color:var(--text-dim); font-size:0.8rem; font-weight:600; margin-bottom:5px; }
        .form-group input { width:100%; padding:12px 16px; background:#1b241f; border:1px solid #3a4f40; border-radius:10px; color:#e2e8e4; font-family:var(--font-ui); font-size:0.9rem; transition:0.2s; }
        .form-group input:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(251,191,36,0.08); }

        .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:13px; border-radius:40px; font-weight:700; font-size:0.95rem; cursor:pointer; border:none; font-family:var(--font-ui); transition:0.25s; }
        .btn-gold { background:var(--gold); color:#000; }
        .btn-gold:hover { background:var(--gold-bright); transform:translateY(-2px); box-shadow:0 8px 25px rgba(251,191,36,0.3); }
        .btn-green { background:var(--green); color:#000; }
        .btn-green:hover { background:var(--green-bright); transform:translateY(-2px); }
        .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

        .msg-box { text-align:center; font-size:0.8rem; margin-top:10px; padding:10px; border-radius:8px; display:none; }
        .msg-error { background:rgba(239,68,68,0.1); color:#f87171; border:1px solid rgba(239,68,68,0.25); display:block; }
        .msg-success { background:rgba(34,197,94,0.1); color:#4ade80; border:1px solid rgba(34,197,94,0.25); display:block; }

        .divider { text-align:center; margin:20px 0; color:var(--text-muted); font-size:0.75rem; position:relative; }
        .divider::before, .divider::after { content:''; position:absolute; top:50%; width:40%; height:1px; background:rgba(255,255,255,0.08); }
        .divider::before { left:0; } .divider::after { right:0; }

        .social-btns { display:flex; gap:8px; }
        .social-btn { flex:1; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:var(--text); cursor:pointer; font-size:0.85rem; font-family:var(--font-ui); transition:0.2s; text-align:center; }
        .social-btn:hover { background:rgba(255,255,255,0.03); border-color:var(--green-border); }

        .footer-link { text-align:center; margin-top:16px; color:var(--text-dim); font-size:0.8rem; }
        .footer-link a { color:var(--green-bright); font-weight:600; cursor:pointer; }
        .footer-link a:hover { text-decoration:underline; }

        .hidden { display:none !important; }

        @media(max-width:480px) { .auth-card{padding:24px 18px} }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">🕊️</div>
            <h1>Welcome Back</h1>
            <p>Sign in to your Ethiopian Peace Archive account</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('signin')">Sign In</button>
            <button class="tab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- Sign In Form -->
        <form id="signinForm" onsubmit="handleSignIn(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signinEmail" placeholder="your@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signinPassword" placeholder="Enter your password" required autocomplete="current-password" minlength="6">
            </div>
            <button type="submit" class="btn btn-gold" id="signinBtn">🔐 Sign In</button>
            <div class="msg-box" id="signinMsg"></div>
        </form>

        <!-- Sign Up Form -->
        <form id="signupForm" class="hidden" onsubmit="handleSignUp(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signupName" placeholder="Your full name" required autocomplete="name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="your@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-green" id="signupBtn">✨ Create Account</button>
            <div class="msg-box" id="signupMsg"></div>
        </form>

        <div class="divider">or continue with</div>
        <div class="social-btns">
            <button class="social-btn" onclick="alert('Google sign-in coming soon')">🔵 Google</button>
            <button class="social-btn" onclick="alert('Email magic link coming soon')">📧 Magic Link</button>
        </div>

        <div class="footer-link" id="footerLink">
            Don't have an account? <a onclick="switchTab('signup')">Sign up here</a>
        </div>
    </div>
</div>

<script src="js/supabase.js"></script>
<script>
    const SUPABASE_URL = 'https://rnafjznurgnrdonyxfgs.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuYWZqem51cmducmRvbnl4ZmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzA1OTEsImV4cCI6MjA5NzM0NjU5MX0.lfJYkGg37CdOwsrvcgvD7I4T054yrPQj-ztfsSo2S0s';

    function switchTab(tab) {
        const signinForm = document.getElementById('signinForm');
        const signupForm = document.getElementById('signupForm');
        const tabs = document.querySelectorAll('.tab');
        const footerLink = document.getElementById('footerLink');

        if (tab === 'signin') {
            signinForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
            footerLink.innerHTML = 'Don\'t have an account? <a onclick="switchTab(\'signup\')">Sign up here</a>';
        } else {
            signinForm.classList.add('hidden');
            signupForm.classList.remove('hidden');
            tabs[0].classList.remove('active');
            tabs[1].classList.add('active');
            footerLink.innerHTML = 'Already have an account? <a onclick="switchTab(\'signin\')">Sign in here</a>';
        }
    }

    async function handleSignIn(e) {
        e.preventDefault();
        const btn = document.getElementById('signinBtn');
        const msg = document.getElementById('signinMsg');
        const email = document.getElementById('signinEmail').value.trim();
        const password = document.getElementById('signinPassword').value;

        msg.className = 'msg-box';
        if (!email || !password) { msg.className = 'msg-box msg-error'; msg.textContent = 'Please fill all fields.'; return; }

        btn.disabled = true; btn.textContent = '⏳ Signing in...';
        try {
            // Try Supabase auth if available
            if (typeof supabase !== 'undefined' && supabase.auth) {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                localStorage.setItem('peace_user', JSON.stringify(data.user));
                msg.className = 'msg-box msg-success'; msg.textContent = '✅ Signed in! Redirecting...';
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
            } else {
                // Fallback: store locally
                localStorage.setItem('peace_user', JSON.stringify({ email, display_name: email.split('@')[0], signed_in_at: new Date().toISOString() }));
                msg.className = 'msg-box msg-success'; msg.textContent = '✅ Signed in locally! Redirecting...';
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
            }
        } catch(err) {
            msg.className = 'msg-box msg-error'; msg.textContent = '❌ ' + (err.message || 'Sign in failed.');
        }
        btn.disabled = false; btn.textContent = '🔐 Sign In';
    }

    async function handleSignUp(e) {
        e.preventDefault();
        const btn = document.getElementById('signupBtn');
        const msg = document.getElementById('signupMsg');
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;

        msg.className = 'msg-box';
        if (!name || !email || !password) { msg.className = 'msg-box msg-error'; msg.textContent = 'Please fill all fields.'; return; }
        if (password.length < 6) { msg.className = 'msg-box msg-error'; msg.textContent = 'Password must be at least 6 characters.'; return; }

        btn.disabled = true; btn.textContent = '⏳ Creating account...';
        try {
            if (typeof supabase !== 'undefined' && supabase.auth) {
                const { data, error } = await supabase.auth.signUp({ email, password, options: { data: { display_name: name } } });
                if (error) throw error;
                localStorage.setItem('peace_user', JSON.stringify(data.user));
                msg.className = 'msg-box msg-success'; msg.textContent = '✅ Account created! Check your email to confirm.';
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
            } else {
                localStorage.setItem('peace_user', JSON.stringify({ email, display_name: name, signed_up_at: new Date().toISOString() }));
                msg.className = 'msg-box msg-success'; msg.textContent = '✅ Account created locally! Redirecting...';
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
            }
        } catch(err) {
            msg.className = 'msg-box msg-error'; msg.textContent = '❌ ' + (err.message || 'Sign up failed.');
        }
        btn.disabled = false; btn.textContent = '✨ Create Account';
    }
</script>
</body>
</html>
