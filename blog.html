<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Blog — Stories, research, and updates from the Ethiopian Peace Archive.">
    <title>Blog — Ethiopian Peace Archive</title>
    <style>
        :root{--bg:#060f1e;--card:#0d1b33;--green:#22c55e;--green-bright:#4ade80;--green-dim:rgba(34,197,94,0.10);--green-border:rgba(34,197,94,0.20);--gold:#fbbf24;--text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Georgia',serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7}
        nav{background:rgba(6,15,30,0.97);border-bottom:1px solid rgba(34,197,94,0.15);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
        nav a{color:var(--text-dim);text-decoration:none;padding:7px 12px;border-radius:20px;font-size:0.8rem;font-family:-apple-system,sans-serif}
        nav a:hover{color:var(--green-bright);background:var(--green-dim)}
        nav .logo{font-size:1rem;font-weight:bold;color:var(--gold)}
        nav .logo span{color:var(--green-bright)}
        .container{max-width:900px;margin:30px auto;padding:0 16px}
        h1{color:var(--gold);margin-bottom:16px;border-left:4px solid var(--green);padding-left:12px;font-family:-apple-system,sans-serif;font-size:1.5rem}
        .blog-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
        .blog-card{background:var(--card);border:1px solid rgba(34,197,94,0.10);border-radius:14px;padding:22px;transition:all 0.3s;cursor:pointer;text-decoration:none;color:var(--text);display:block}
        .blog-card:hover{border-color:var(--green);transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,0.5)}
        .blog-card .cat{display:inline-block;padding:3px 10px;border-radius:10px;font-size:0.7rem;background:var(--green-dim);color:var(--green-bright);margin-bottom:10px;font-family:-apple-system,sans-serif}
        .blog-card h3{color:var(--gold);margin-bottom:8px;font-family:-apple-system,sans-serif;font-size:1.1rem}
        .blog-card p{color:var(--text-dim);font-size:0.85rem;line-height:1.5}
        .blog-card .date{color:var(--text-muted);font-size:0.7rem;margin-top:10px;font-family:-apple-system,sans-serif}
        .loading{text-align:center;padding:40px;color:var(--text-dim);font-family:-apple-system,sans-serif}
        .btn{display:inline-block;padding:10px 20px;border-radius:20px;background:var(--green);color:#000;text-decoration:none;font-weight:700;font-family:-apple-system,sans-serif;font-size:0.85rem}
        footer{text-align:center;padding:24px;color:var(--text-muted);border-top:1px solid rgba(34,197,94,0.10);margin-top:30px;font-family:-apple-system,sans-serif;font-size:0.78rem}
        @media(max-width:768px){.blog-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">🕊️ Ethiopian <span>Peace</span> Archive</a>
    <div style="display:flex;gap:2px;flex-wrap:wrap">
        <a href="index.html">Home</a><a href="voices.html">Voices</a>
        <a href="blog.html" style="color:var(--green-bright);background:var(--green-dim)">Blog</a>
        <a href="courses.html">Courses</a><a href="dashboard.html">Impact</a>
        <a href="gallery.html">Gallery</a><a href="support.html">Support</a>
    </div>
</nav>

<main class="container">
    <h1>📝 Blog & Stories</h1>
    <div class="blog-grid" id="blogGrid"><div class="loading">Loading posts...</div></div>
</main>

<footer><p>Ethiopian Peace Archive &copy; 2026</p></footer>

<script>
const API = 'https://peace-api.peace-01d.workers.dev';

async function loadBlogs(){
    try{
        const r = await fetch(`${API}/api/blogs`);
        const posts = await r.json();
        const grid = document.getElementById('blogGrid');
        
        if(!posts.length){
            grid.innerHTML = '<div class="loading">No posts yet.</div>';
            return;
        }
        
        grid.innerHTML = posts.map(p => `
            <a href="blog-post.html?slug=${p.slug}" class="blog-card">
                <span class="cat">${p.category||'Story'}</span>
                <h3>${p.title}</h3>
                <p>${p.excerpt||p.content.substring(0,120)+'...'}</p>
                <div class="date">${new Date(p.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div>
            </a>
        `).join('');
    }catch(e){
        document.getElementById('blogGrid').innerHTML = '<div class="loading">Error loading posts.</div>';
    }
}
loadBlogs();
</script>
</body>
</html>
