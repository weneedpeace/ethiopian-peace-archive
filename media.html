<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Media Coverage — Radio, TV, and newspaper coverage of the Ethiopian Peace Archive.">
    <title>Media Coverage — Ethiopian Peace Archive</title>
    <style>
        :root{--bg:#060f1e;--card:#0d1b33;--green:#22c55e;--green-bright:#4ade80;--green-dim:rgba(34,197,94,0.10);--green-border:rgba(34,197,94,0.20);--gold:#fbbf24;--text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Georgia',serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7}
        nav{background:rgba(6,15,30,0.97);border-bottom:1px solid rgba(34,197,94,0.15);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
        nav a{color:var(--text-dim);text-decoration:none;padding:8px 16px;border-radius:25px;font-size:0.85rem;font-family:-apple-system,sans-serif}
        nav a:hover{color:var(--green-bright);background:var(--green-dim)}
        nav .logo{font-size:1.2rem;font-weight:bold;color:var(--gold)}
        nav .logo span{color:var(--green-bright)}
        .container{max-width:900px;margin:40px auto;padding:0 20px}
        h1{color:var(--gold);margin-bottom:20px;border-left:5px solid var(--green);padding-left:16px;font-family:-apple-system,sans-serif;font-size:1.8rem}
        .media-card{background:var(--card);border:1px solid rgba(34,197,94,0.10);border-radius:14px;padding:20px;margin-bottom:16px;display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;transition:all 0.3s}
        .media-card:hover{border-color:var(--green);transform:translateY(-2px)}
        .media-card .icon{font-size:2.5rem;min-width:55px;text-align:center}
        .media-card .info{flex:1;min-width:200px}
        .media-card h3{color:var(--gold);margin-bottom:4px;font-family:-apple-system,sans-serif;font-size:1.1rem}
        .media-card p{color:var(--text-dim);font-size:0.85rem}
        .media-card .tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:0.7rem;background:var(--green-dim);color:var(--green-bright);margin:2px 4px;font-family:-apple-system,sans-serif}
        .media-card audio,.media-card video{width:100%;margin-top:10px;border-radius:8px}
        .media-card img{max-width:200px;border-radius:8px;margin-top:10px}
        .loading{text-align:center;padding:40px;color:var(--text-dim)}
        .spinner{display:inline-block;width:22px;height:22px;border:3px solid var(--green-border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle}
        @keyframes spin{to{transform:rotate(360deg)}}
        footer{text-align:center;padding:30px;color:var(--text-muted);border-top:1px solid rgba(34,197,94,0.10);margin-top:40px;font-family:-apple-system,sans-serif;font-size:0.85rem}
        footer a{color:var(--text-dim);text-decoration:none}
    </style>
</head>
<body>

<nav>
    <a href="index.html" style="text-decoration:none"><div class="logo">🕊️ Ethiopian <span>Peace</span> Archive</div></a>
    <div style="display:flex;gap:4px;flex-wrap:wrap">
        <a href="index.html">Home</a><a href="voices.html">Voices</a><a href="blog.html">Blog</a>
        <a href="courses.html">Courses</a><a href="dashboard.html">Impact</a>
        <a href="contribute.html">Contribute</a><a href="support.html">Support</a>
    </div>
</nav>

<main class="container">
    <h1>📰 Media Coverage</h1>
    <p style="color:var(--text-dim);margin-bottom:30px">Radio, TV, and newspaper coverage from Ethiopia and beyond.</p>
    <div id="mediaContainer"><div class="loading"><span class="spinner"></span>Loading media...</div></div>
</main>

<footer>
    <p>Ethiopian Peace Archive &copy; 2026 · <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a> · <a href="contact.html">Contact</a></p>
</footer>

<script>
const URL='https://rnafjznurgnrdonyxfgs.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuYWZqem51cmducmRvbnl4ZmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzA1OTEsImV4cCI6MjA5NzM0NjU5MX0.lfJYkGg37CdOwsrvcgvD7I4T054yrPQj-ztfsSo2S0s';

async function loadMedia(){
    try{
        const r=await fetch(`${URL}/rest/v1/media_coverage?select=*&is_published=eq.true&order=created_at.desc`,{headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`}});
        const media=await r.json();
        const container=document.getElementById('mediaContainer');
        const icons={radio:'🎙️',tv:'📺',newspaper:'📰',online:'🌐'};
        if(!media||media.length===0){container.innerHTML='<div class="loading">Media coverage coming soon.</div>';return}
        container.innerHTML=media.map(m=>{
            const icon=icons[m.media_type]||'📄';
            let mc='';
            if(m.media_type==='radio'&&m.audio_url) mc=`<audio controls src="${m.audio_url}"></audio>`;
            if(m.media_type==='tv'&&m.video_url) mc=`<video controls src="${m.video_url}"></video>`;
            if(m.media_type==='newspaper'&&m.thumbnail_url) mc=`<a href="${m.link||m.thumbnail_url}" target="_blank"><img src="${m.thumbnail_url}" alt="${esc(m.title)}"></a>`;
            return `<div class="media-card">
                <div class="icon">${icon}</div>
                <div class="info">
                    <h3>${esc(m.title)}</h3>
                    <p>${esc(m.description||'')}</p>
                    <span class="tag">${m.media_type?.toUpperCase()}</span>
                    ${m.date?`<span class="tag">📅 ${m.date}</span>`:''}
                    ${mc}
                </div>
            </div>`;
        }).join('');
    }catch(e){document.getElementById('mediaContainer').innerHTML='<div class="loading">Error loading media.</div>'}
}
function esc(t){if(!t)return'';const d=document.createElement('div');d.textContent=t;return d.innerHTML}
loadMedia();
</script>
</body>
</html>
