<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Ethiopian Peace Archive</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
        .admin-tab { padding: 8px 16px; border-radius: 20px; cursor: pointer; border: 1px solid var(--green-border); background: var(--card); color: var(--text-dim); font-family: var(--font-ui); font-size: 0.8rem; }
        .admin-tab.active { background: var(--green); color: #000; font-weight: 700; }
        .admin-panel { display: none; }
        .admin-panel.active { display: block; }
        .upload-area { border: 2px dashed var(--green-border); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 12px; }
        .upload-area img { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="loginScreen" style="display:flex;align-items:center;justify-content:center;min-height:100vh">
    <div style="background:var(--card);border:1px solid var(--green-border);border-radius:16px;padding:30px;max-width:380px;width:100%;text-align:center">
        <h1 style="color:var(--gold);margin-bottom:16px">🔐 Admin Panel</h1>
        <form onsubmit="return login()">
            <input type="email" id="email" placeholder="Email" required><br><br>
            <input type="password" id="pass" placeholder="Password" required><br><br>
            <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
        </form>
        <p id="loginMsg" style="color:var(--red);margin-top:10px;display:none"></p>
    </div>
</div>

<div id="panel" style="display:none;max-width:800px;margin:0 auto;padding:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h2 style="color:var(--gold)">⚙️ Admin Dashboard</h2>
        <button class="btn btn-sm btn-red" onclick="logout()">Logout</button>
    </div>

    <div class="admin-tabs">
        <span class="admin-tab active" onclick="switchTab('blog')">📝 Blog</span>
        <span class="admin-tab" onclick="switchTab('gallery')">🖼️ Gallery</span>
        <span class="admin-tab" onclick="switchTab('course')">🎓 Course</span>
        <span class="admin-tab" onclick="switchTab('lesson')">📚 Lesson</span>
    </div>

    <p id="msgBox" style="display:none;padding:10px;border-radius:8px;margin-bottom:10px"></p>

    <!-- BLOG -->
    <div class="admin-panel active" id="panel-blog">
        <div style="background:var(--card);border:1px solid var(--green-border);border-radius:12px;padding:20px">
            <h3 style="color:var(--gold);margin-bottom:12px">📝 New Blog Post</h3>
            <form onsubmit="return saveBlog()">
                <input type="text" id="bTitle" placeholder="Blog Title" required><br><br>
                <input type="text" id="bSlug" placeholder="slug-url-name" required><br><br>
                <textarea id="bContent" placeholder="Blog content..." style="min-height:150px"></textarea><br><br>
                <input type="text" id="bExcerpt" placeholder="Short excerpt"><br><br>
                <select id="bCategory"><option>Story</option><option>Research</option><option>Announcement</option><option>Impact</option><option>Media</option></select><br><br>
                <label style="color:var(--text-dim);font-size:0.85rem">Featured Image</label>
                <div class="upload-area" onclick="document.getElementById('blogFile').click()">
                    <p id="blogUploadText">📷 Tap to upload image</p>
                    <img id="blogPreview" style="display:none">
                </div>
                <input type="file" id="blogFile" accept="image/*" style="display:none" onchange="uploadImage('blogFile','blogPreview','blogUploadText','bImageUrl')">
                <input type="hidden" id="bImageUrl"><br>
                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:10px">💾 Publish Blog Post</button>
            </form>
        </div>
    </div>

    <!-- GALLERY -->
    <div class="admin-panel" id="panel-gallery">
        <div style="background:var(--card);border:1px solid var(--green-border);border-radius:12px;padding:20px">
            <h3 style="color:var(--gold);margin-bottom:12px">🖼️ Add Gallery Photo</h3>
            <form onsubmit="return saveGallery()">
                <input type="text" id="gTitle" placeholder="Photo title"><br><br>
                <input type="text" id="gCategory" placeholder="Category (Events, Community...)"><br><br>
                <div class="upload-area" onclick="document.getElementById('galleryFile').click()">
                    <p id="galleryUploadText">📷 Tap to upload image</p>
                    <img id="galleryPreview" style="display:none">
                </div>
                <input type="file" id="galleryFile" accept="image/*" style="display:none" onchange="uploadImage('galleryFile','galleryPreview','galleryUploadText','gImageUrl')">
                <input type="hidden" id="gImageUrl"><br>
                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:10px">💾 Add to Gallery</button>
            </form>
        </div>
    </div>

    <!-- COURSE -->
    <div class="admin-panel" id="panel-course">
        <div style="background:var(--card);border:1px solid var(--green-border);border-radius:12px;padding:20px">
            <h3 style="color:var(--gold);margin-bottom:12px">🎓 New Course</h3>
            <form onsubmit="return saveCourse()">
                <input type="text" id="cTitle" placeholder="Course Title" required><br><br>
                <input type="text" id="cSlug" placeholder="slug-url-name" required><br><br>
                <input type="text" id="cDesc" placeholder="Short description"><br><br>
                <select id="cLevel"><option>Beginner</option><option>Intermediate</option><option>Advanced</option><option>All Levels</option></select><br><br>
                <input type="number" id="cModules" placeholder="Modules" value="6"><br><br>
                <button type="submit" class="btn btn-primary" style="width:100%">💾 Save Course</button>
            </form>
        </div>
    </div>

    <!-- LESSON -->
    <div class="admin-panel" id="panel-lesson">
        <div style="background:var(--card);border:1px solid var(--green-border);border-radius:12px;padding:20px">
            <h3 style="color:var(--gold);margin-bottom:12px">📚 Add Lesson</h3>
            <form onsubmit="return saveLesson()">
                <select id="lCourseId" required><option value="">Select Course...</option></select><br><br>
                <input type="text" id="lTitle" placeholder="Lesson Title" required><br><br>
                <textarea id="lContent" placeholder="Lesson content..."></textarea><br><br>
                <input type="number" id="lOrder" placeholder="Order (1,2,3...)" value="1"><br><br>
                <button type="submit" class="btn btn-primary" style="width:100%">💾 Save Lesson</button>
            </form>
        </div>
    </div>
</div>

<script>
const URL = 'https://rnafjznurgnrdonyxfgs.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuYWZqem51cmducmRvbnl4ZmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzA1OTEsImV4cCI6MjA5NzM0NjU5MX0.lfJYkGg37CdOwsrvcgvD7I4T054yrPQj-ztfsSo2S0s';

function msg(text, color) {
    var m = document.getElementById('msgBox');
    m.textContent = text;
    m.style.display = 'block';
    m.style.background = color === 'green' ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)';
    m.style.color = color === 'green' ? '#4ade80' : '#ef4444';
    m.style.border = '1px solid ' + (color === 'green' ? '#22c55e' : 'rgba(239,68,68,0.3)');
    setTimeout(function(){ m.style.display = 'none'; }, 4000);
}

function login() {
    if (document.getElementById('email').value === 'admin@peacearchive.org' && document.getElementById('pass').value === 'Peace2026!') {
        localStorage.setItem('epa_admin', '1');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('panel').style.display = 'block';
        loadCourses();
        return false;
    }
    document.getElementById('loginMsg').style.display = 'block';
    document.getElementById('loginMsg').textContent = 'Wrong credentials';
    return false;
}

function logout() { localStorage.removeItem('epa_admin'); location.reload(); }

if (localStorage.getItem('epa_admin') === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    loadCourses();
}

function switchTab(tab) {
    document.querySelectorAll('.admin-tab').forEach(function(t){ t.classList.remove('active'); });
    event.target.classList.add('active');
    document.querySelectorAll('.admin-panel').forEach(function(p){ p.classList.remove('active'); });
    document.getElementById('panel-' + tab).classList.add('active');
    if (tab === 'lesson') loadCourses();
}

async function uploadImage(fileId, previewId, textId, hiddenId) {
    var file = document.getElementById(fileId).files[0];
    if (!file) return;
    
    var reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById(previewId).src = e.target.result;
        document.getElementById(previewId).style.display = 'block';
        document.getElementById(textId).style.display = 'none';
    };
    reader.readAsDataURL(file);
    
    msg('Uploading image...', 'green');
    
    var formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', 'peace_archive');
    
    try {
        var res = await fetch('https://api.cloudinary.com/v1_1/djb3falqu/image/upload', { method: 'POST', body: formData });
        var data = await res.json();
        if (data.secure_url) {
            document.getElementById(hiddenId).value = data.secure_url;
            msg('Image uploaded!', 'green');
        } else {
            msg('Upload failed', 'red');
        }
    } catch(e) {
        msg('Upload failed', 'red');
    }
}

async function saveToDB(table, data) {
    var res = await fetch(URL + '/rest/v1/' + table, {
        method: 'POST',
        headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(data)
    });
    return res.ok;
}

async function saveBlog() {
    var data = {
        title: document.getElementById('bTitle').value,
        slug: document.getElementById('bSlug').value,
        content: document.getElementById('bContent').value,
        excerpt: document.getElementById('bExcerpt').value,
        category: document.getElementById('bCategory').value,
        image_url: document.getElementById('bImageUrl').value,
        is_published: true
    };
    var ok = await saveToDB('blog_posts', data);
    msg(ok ? 'Blog published!' : 'Failed to save', ok ? 'green' : 'red');
    if (ok) { document.getElementById('bTitle').value = ''; document.getElementById('bSlug').value = ''; document.getElementById('bContent').value = ''; }
    return false;
}

async function saveGallery() {
    var url = document.getElementById('gImageUrl').value;
    if (!url) { msg('Upload an image first', 'red'); return false; }
    var data = {
        title: document.getElementById('gTitle').value,
        image_url: url,
        category: document.getElementById('gCategory').value || 'General',
        is_published: true
    };
    var ok = await saveToDB('gallery', data);
    msg(ok ? 'Photo added to gallery!' : 'Failed to save', ok ? 'green' : 'red');
    if (ok) { document.getElementById('gTitle').value = ''; document.getElementById('galleryPreview').style.display = 'none'; document.getElementById('galleryUploadText').style.display = 'block'; }
    return false;
}

async function saveCourse() {
    var data = {
        title: document.getElementById('cTitle').value,
        slug: document.getElementById('cSlug').value,
        description: document.getElementById('cDesc').value,
        level: document.getElementById('cLevel').value,
        module_count: parseInt(document.getElementById('cModules').value),
        is_published: true
    };
    var ok = await saveToDB('courses', data);
    msg(ok ? 'Course saved!' : 'Failed', ok ? 'green' : 'red');
    return false;
}

async function saveLesson() {
    var data = {
        course_id: parseInt(document.getElementById('lCourseId').value),
        title: document.getElementById('lTitle').value,
        content: document.getElementById('lContent').value,
        lesson_order: parseInt(document.getElementById('lOrder').value),
        is_published: true
    };
    var ok = await saveToDB('course_lessons', data);
    msg(ok ? 'Lesson saved!' : 'Failed', ok ? 'green' : 'red');
    return false;
}

async function loadCourses() {
    try {
        var res = await fetch(URL + '/rest/v1/courses?select=id,title&is_published=eq.true', { headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY } });
        var courses = await res.json();
        var sel = document.getElementById('lCourseId');
        sel.innerHTML = '<option value="">Select Course...</option>';
        courses.forEach(function(c) { sel.innerHTML += '<option value="' + c.id + '">' + c.title + '</option>'; });
    } catch(e) {}
}
</script>
</body>
</html>
