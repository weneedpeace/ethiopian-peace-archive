<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Blog Post — Ethiopian Peace Archive">
    <title>Blog — Ethiopian Peace Archive</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .post-content { color: var(--text-dim); font-size: 1.05rem; line-height: 1.9; }
        .post-content p { margin-bottom: 16px; }
        .post-header { margin-bottom: 24px; }
        .post-header .cat { display: inline-block; padding: 4px 12px; border-radius: 10px; font-size: 0.75rem; background: var(--green-dim); color: var(--green-bright); margin-bottom: 12px; font-family: var(--font-ui); }
        .post-header h1 { color: var(--gold); font-size: clamp(1.4rem, 3vw, 2rem); margin-bottom: 8px; }
        .post-header .date { color: var(--text-muted); font-size: 0.8rem; font-family: var(--font-ui); }
        .back-link { display: inline-block; margin-top: 30px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">🕊️ Ethiopian <span>Peace</span> Archive</a>
        <div class="desktop-links">
            <a href="index.html">Home</a>
            <a href="blog.html">Blog</a>
            <a href="voices.html">Voices</a>
            <span style="display:flex;gap:2px;margin-left:6px">
                <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">EN</button>
                <button class="lang-btn" data-lang="am" onclick="setLanguage('am')">አማ</button>
                <button class="lang-btn" data-lang="om" onclick="setLanguage('om')">Oromo</button>
            </span>
        </div>
        <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu"><span></span><span></span><span></span></button>
    </nav>

    <div class="slide-overlay" id="slideOverlay" onclick="toggleMenu()"></div>
    <div class="slide-menu" id="slideMenu">
        <div class="menu-header"><div class="flag">🇪🇹🕊️</div><h3>Ethiopian Peace Archive</h3></div>
        <a href="index.html"><span class="menu-icon">🏠</span>Home</a>
        <a href="blog.html"><span class="menu-icon">📝</span>Blog</a>
        <a href="voices.html"><span class="menu-icon">🗣️</span>Voices</a>
        <a href="courses.html"><span class="menu-icon">🎓</span>Courses</a>
        <a href="dashboard.html"><span class="menu-icon">📊</span>Impact</a>
        <a href="gallery.html"><span class="menu-icon">🖼️</span>Gallery</a>
        <a href="support.html"><span class="menu-icon">❤️</span>Support</a>
    </div>

    <main class="container-sm" id="postContainer">
        <div class="loading"><span class="spinner"></span>Loading post...</div>
    </main>

    <footer>
        <div style="text-align:center;color:var(--text-muted);font-size:0.72rem;padding:16px;border-top:1px solid rgba(255,255,255,0.05)">
            <p>Ethiopian Peace Archive &copy; 2026</p>
            <p style="margin-top:4px"><a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a></p>
        </div>
    </footer>

    <script src="js/supabase.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/language.js"></script>
    <script>
        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            const container = document.getElementById('postContainer');

            if (!slug) {
                container.innerHTML = '<div class="loading">Post not found. <a href="blog.html" style="color:var(--green-bright)">Browse all posts →</a></div>';
                return;
            }

            try {
                const posts = await fetchFromSupabase('blog_posts', `slug=eq.${encodeURIComponent(slug)}&is_published=eq.true`);
                
                if (!posts || !posts.length) {
                    container.innerHTML = '<div class="loading">Post not found. <a href="blog.html" style="color:var(--green-bright)">Browse all posts →</a></div>';
                    return;
                }

                const p = posts[0];
                document.title = p.title + ' — Ethiopian Peace Archive';

                container.innerHTML = `
                    <article>
                        <div class="post-header">
                            <span class="cat">${escapeHTML(p.category || 'Story')}</span>
                            <h1>${escapeHTML(p.title)}</h1>
                            <div class="date">
                                ${new Date(p.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}
                                ${p.author ? ' · ' + escapeHTML(p.author) : ' · Ethiopian Peace Archive'}
                            </div>
                        </div>
                        <div class="post-content">
                            ${p.content.split('\n').filter(para => para.trim()).map(para => `<p>${escapeHTML(para)}</p>`).join('')}
                        </div>
                        <div class="back-link">
                            <a href="blog.html" class="btn btn-outline">← Back to All Posts</a>
                        </div>
                    </article>
                `;
            } catch (e) {
                container.innerHTML = '<div class="loading">Error loading post. <a href="blog.html" style="color:var(--green-bright)">Back to blog →</a></div>';
                console.error('Blog post error:', e);
            }
        }

        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        loadPost();
    </script>
</body>
</html>
