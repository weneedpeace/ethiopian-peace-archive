<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Blog Post — Ethiopian Peace Archive">
    <title>Blog — Ethiopian Peace Archive</title>
    <style>
        :root{--bg:#060f1e;--card:#0d1b33;--green:#22c55e;--green-bright:#4ade80;--green-border:rgba(34,197,94,0.20);--gold:#fbbf24;--text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Georgia',serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.9}
        nav{background:rgba(6,15,30,0.97);border-bottom:1px solid rgba(34,197,94,0.15);padding:12px 16px}
        nav a{color:var(--text-dim);text-decoration:none;font-size:0.85rem;font-family:-apple-system,sans-serif}
        nav .logo{font-size:1rem;font-weight:bold;color:var(--gold)}
        nav .logo span{color:var(--green-bright)}
        .container{max-width:750px;margin:30px auto;padding:0 16px}
        .post-header{margin-bottom:24px}
        .post-header .cat{display:inline-block;padding:4px 12px;border-radius:10px;font-size:0.75rem;background:rgba(34,197,94,0.12);color:var(--green-bright);margin-bottom:12px;font-family:-apple-system,sans-serif}
        .post-header h1{color:var(--gold);font-size:clamp(1.4rem,3vw,2rem);margin-bottom:8px}
        .post-header .date{color:var(--text-muted);font-size:0.8rem;font-family:-apple-system,sans-serif}
        .post-content{color:var(--text-dim);font-size:1.05rem;line-height:1.9}
        .post-content p{margin-bottom:16px}
        .loading{text-align:center;padding:60px;color:var(--text-dim);font-family:-apple-system,sans-serif}
        .btn{display:inline-block;padding:10px 20px;border-radius:20px;background:var(--green);color:#000;text-decoration:none;font-weight:700;font-family:-apple-system,sans-serif;font-size:0.85rem}
        footer{text-align:center;padding:24px;color:var(--text-muted);border-top:1px solid rgba(34,197,94,0.10);margin-top:40px;font-family:-apple-system,sans-serif;font-size:0.78rem}
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">🕊️ Ethiopian <span>Peace</span> Archive</a>
    <a href="blog.html" style="float:right">← Back to Blog</a>
</nav>

<main class="container" id="postContainer">
    <div class="loading">Loading post...</div>
</main>

<footer><p>Ethiopian Peace Archive &copy; 2026</p></footer>

<script>
const API = 'https://peace-api.peace-01d.workers.dev';

async function loadPost(){
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    
    if(!slug){
        document.getElementById('postContainer').innerHTML = '<div class="loading">Post not found.</div>';
        return;
    }
    
    try{
        const r = await fetch(`${API}/api/blogs/${slug}`);
        const post = await r.json();
        
        if(post.error){
            document.getElementById('postContainer').innerHTML = '<div class="loading">Post not found.</div>';
            return;
        }
        
        document.title = post.title + ' — Ethiopian Peace Archive';
        document.getElementById('postContainer').innerHTML = `
            <div class="post-header">
                <span class="cat">${post.category||'Story'}</span>
                <h1>${post.title}</h1>
                <div class="date">${new Date(post.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})} · ${post.author||'Ethiopian Peace Archive'}</div>
            </div>
            <div class="post-content">
                ${post.content.split('\n').map(p=>`<p>${p}</p>`).join('')}
            </div>
            <div style="margin-top:30px">
                <a href="blog.html" class="btn">← Back to All Posts</a>
            </div>
        `;
    }catch(e){
        document.getElementById('postContainer').innerHTML = '<div class="loading">Error loading post.</div>';
    }
}

loadPost();
</script>
</body>
</html>
