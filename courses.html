<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free peace education courses. No signup required.">
    <title>Free Courses — Ethiopian Peace Archive</title>
    <style>
        :root{--bg:#060f1e;--card:#0d1b33;--green:#22c55e;--green-bright:#4ade80;--green-dim:rgba(34,197,94,0.10);--green-border:rgba(34,197,94,0.20);--gold:#fbbf24;--text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Georgia',serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7}
        nav{background:rgba(6,15,30,0.97);border-bottom:1px solid rgba(34,197,94,0.15);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
        nav a{color:var(--text-dim);text-decoration:none;padding:7px 12px;border-radius:20px;font-size:0.8rem;font-family:-apple-system,sans-serif}
        nav a:hover{color:var(--green-bright);background:var(--green-dim)}
        nav .logo{font-size:1rem;font-weight:bold;color:var(--gold)}
        nav .logo span{color:var(--green-bright)}
        .container{max-width:1000px;margin:30px auto;padding:0 16px}
        h1{color:var(--gold);margin-bottom:8px;border-left:4px solid var(--green);padding-left:12px;font-family:-apple-system,sans-serif;font-size:1.5rem}
        .subtitle{color:var(--text-dim);margin-bottom:24px}
        .course-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
        .course-card{background:var(--card);border:1px solid rgba(34,197,94,0.10);border-radius:14px;padding:22px;transition:all 0.3s;cursor:pointer}
        .course-card:hover{border-color:var(--green);transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,0.5)}
        .course-card .icon{font-size:2.2rem;margin-bottom:10px}
        .course-card h3{color:var(--gold);margin-bottom:6px;font-family:-apple-system,sans-serif;font-size:1.1rem}
        .course-card p{color:var(--text-dim);font-size:0.82rem;line-height:1.5;margin-bottom:10px}
        .course-card .tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:0.7rem;background:var(--green-dim);color:var(--green-bright);font-family:-apple-system,sans-serif;margin:2px}
        .btn{display:inline-block;padding:10px 20px;border-radius:20px;background:var(--green);color:#000;text-decoration:none;font-weight:700;font-family:-apple-system,sans-serif;font-size:0.85rem;border:none;cursor:pointer;margin-top:8px}
        .btn:hover{background:var(--green-bright)}
        .loading{text-align:center;padding:40px;color:var(--text-dim)}
        #courseDetail{display:none}
        #courseDetail h2{color:var(--gold);margin-bottom:16px}
        .lesson-card{background:var(--card);border:1px solid rgba(34,197,94,0.10);border-radius:10px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
        .lesson-card .num{width:32px;height:32px;border-radius:50%;background:var(--green);color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:-apple-system,sans-serif;font-size:0.85rem;flex-shrink:0}
        .lesson-card h4{color:var(--text);font-family:-apple-system,sans-serif;font-size:0.9rem}
        .back-btn{margin-bottom:16px;cursor:pointer;color:var(--green-bright);font-family:-apple-system,sans-serif;font-size:0.9rem}
        footer{text-align:center;padding:24px;color:var(--text-muted);border-top:1px solid rgba(34,197,94,0.10);margin-top:40px;font-family:-apple-system,sans-serif;font-size:0.78rem}
        @media(max-width:768px){.course-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">🕊️ Ethiopian <span>Peace</span> Archive</a>
    <div style="display:flex;gap:2px;flex-wrap:wrap">
        <a href="index.html">Home</a><a href="voices.html">Voices</a><a href="blog.html">Blog</a>
        <a href="courses.html" style="color:var(--green-bright);background:var(--green-dim)">Courses</a>
        <a href="dashboard.html">Impact</a><a href="gallery.html">Gallery</a><a href="support.html">Support</a>
    </div>
</nav>

<main class="container">
    <div id="courseList">
        <h1>🎓 Free Peace Courses</h1>
        <p class="subtitle">Open to everyone. No registration required. Learn at your own pace.</p>
        <div class="course-grid" id="courseGrid"><div class="loading">Loading courses...</div></div>
    </div>
    
    <div id="courseDetail">
        <div class="back-btn" onclick="showList()">← Back to All Courses</div>
        <h2 id="detailTitle"></h2>
        <p style="color:var(--text-dim);margin-bottom:16px" id="detailDesc"></p>
        <div id="lessonList"></div>
    </div>
</main>

<footer><p>Ethiopian Peace Archive &copy; 2026</p></footer>

<script>
const URL='https://rnafjznurgnrdonyxfgs.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuYWZqem51cmducmRvbnl4ZmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzA1OTEsImV4cCI6MjA5NzM0NjU5MX0.lfJYkGg37CdOwsrvcgvD7I4T054yrPQj-ztfsSo2S0s';

let allCourses = [];

async function loadCourses(){
    try{
        const r = await fetch(`${URL}/rest/v1/courses?select=*&is_published=eq.true&order=created_at.desc`,{
            headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`}
        });
        allCourses = await r.json();
        const grid = document.getElementById('courseGrid');
        
        if(!allCourses.length){ grid.innerHTML='<div class="loading">No courses yet.</div>'; return; }
        
        const icons = ['🕊️','🇪🇹','🗣️','🌍','📚','🤝'];
        grid.innerHTML = allCourses.map((c,i) => `
            <div class="course-card" onclick="showDetail(${c.id})">
                <div class="icon">${icons[i%6]}</div>
                <h3>${c.title}</h3>
                <p>${c.description||'Learn peacebuilding skills.'}</p>
                <span class="tag">${c.level||'All Levels'}</span>
                <span class="tag">${c.module_count||'?'} Modules</span>
                <span class="tag">Free</span>
                <div><button class="btn">View Course →</button></div>
            </div>
        `).join('');
    }catch(e){ document.getElementById('courseGrid').innerHTML='<div class="loading">Error loading.</div>'; }
}

async function showDetail(courseId){
    try{
        const course = allCourses.find(c=>c.id===courseId);
        if(!course) return;
        
        document.getElementById('courseList').style.display='none';
        document.getElementById('courseDetail').style.display='block';
        document.getElementById('detailTitle').textContent=course.title;
        document.getElementById('detailDesc').textContent=course.description;
        
        const r = await fetch(`${URL}/rest/v1/course_lessons?select=*&course_id=eq.${courseId}&is_published=eq.true&order=lesson_order`,{
            headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`}
        });
        const lessons = await r.json();
        
        document.getElementById('lessonList').innerHTML = lessons.length ? 
            '<h3 style="color:var(--gold);margin-bottom:12px">📚 Lessons</h3>' +
            lessons.map(l => `
                <div class="lesson-card">
                    <div class="num">${l.lesson_order}</div>
                    <div><h4>${l.title}</h4>
                    ${l.content?`<p style="color:var(--text-dim);font-size:0.8rem;margin-top:4px">${l.content.substring(0,150)}...</p>`:''}
                    </div>
                </div>
            `).join('')
            : '<p style="color:var(--text-dim)">Lessons coming soon.</p>';
            
        window.scrollTo(0,0);
    }catch(e){}
}

function showList(){
    document.getElementById('courseList').style.display='block';
    document.getElementById('courseDetail').style.display='none';
}

loadCourses();
</script>
</body>
</html>
